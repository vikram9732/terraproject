name: App CI/CD Pipeline

on:
  push:
    branches:
      - dev

jobs:
  deploy-app:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        run: |
          aws ecr get-login-password --region ${{ secrets.AWS_REGION }} | docker login --username AWS --password-stdin ${{ secrets.ECR_REGISTRY }}

      - name: Set image tag
        run: echo "IMAGE_TAG=${GITHUB_SHA}" >> $GITHUB_ENV

      - name: Build backend image
        run: |
          docker build -t backend:${IMAGE_TAG} ./terraform/environment/prd/app/backend
          docker tag backend:${IMAGE_TAG} ${{ secrets.ECR_REGISTRY }}/${{ secrets.BACKEND_REPO }}:${IMAGE_TAG}

      - name: Push backend image
        run: |
          docker push ${{ secrets.ECR_REGISTRY }}/${{ secrets.BACKEND_REPO }}:${IMAGE_TAG}

      - name: Build frontend image
        run: |
          docker build -t frontend:${IMAGE_TAG} ./terraform/environment/prd/app/frontend
          docker tag frontend:${IMAGE_TAG} ${{ secrets.ECR_REGISTRY }}/${{ secrets.FRONTEND_REPO }}:${IMAGE_TAG}

      - name: Push frontend image
        run: |
          docker push ${{ secrets.ECR_REGISTRY }}/${{ secrets.FRONTEND_REPO }}:${IMAGE_TAG}

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          IMAGE_TAG: ${{ env.IMAGE_TAG }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}
          BACKEND_REPO: ${{ secrets.BACKEND_REPO }}
          FRONTEND_REPO: ${{ secrets.FRONTEND_REPO }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: IMAGE_TAG,AWS_REGION,ECR_REGISTRY,BACKEND_REPO,FRONTEND_REPO
          script: |
            echo "Deploy starting..."

            aws ecr get-login-password --region $AWS_REGION | docker login --username AWS --password-stdin $ECR_REGISTRY

            BACKEND_IMAGE=$ECR_REGISTRY/$BACKEND_REPO:$IMAGE_TAG
            FRONTEND_IMAGE=$ECR_REGISTRY/$FRONTEND_REPO:$IMAGE_TAG

            docker pull $BACKEND_IMAGE
            docker pull $FRONTEND_IMAGE

            docker stop backend-container || true
            docker rm backend-container || true
            docker stop frontend-container || true
            docker rm frontend-container || true

            docker network create app-network || true

            docker run -d \
              --name backend-container \
              --network app-network \
              -p 5000:5000 \
              $BACKEND_IMAGE

            docker run -d \
              --name frontend-container \
              --network app-network \
              -p 3000:80 \
              $FRONTEND_IMAGE
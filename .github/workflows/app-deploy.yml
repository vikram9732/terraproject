n- name: Deploy to EC2 via SSH
  uses: appleboy/ssh-action@v1.0.3
  env:
    IMAGE_TAG: ${{ env.IMAGE_TAG }}
    AWS_REGION: ${{ secrets.AWS_REGION }}
    ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}
    BACKEND_REPO: ${{ secrets.BACKEND_REPO }}
    FRONTEND_REPO: ${{ secrets.FRONTEND_REPO }}
  with:
    host: ${{ secrets.EC2_HOST }}
    username: ${{ secrets.EC2_USER }}
    key: ${{ secrets.EC2_SSH_KEY }}
    envs: IMAGE_TAG,AWS_REGION,ECR_REGISTRY,BACKEND_REPO,FRONTEND_REPO
    script: |
      aws ecr get-login-password --region $AWS_REGION | docker login --username AWS --password-stdin $ECR_REGISTRY

      docker pull $ECR_REGISTRY/$BACKEND_REPO:$IMAGE_TAG
      docker pull $ECR_REGISTRY/$FRONTEND_REPO:$IMAGE_TAG

      docker stop backend-container || true
      docker rm backend-container || true
      docker stop frontend-container || true
      docker rm frontend-container || true

      docker network create app-network || true

      docker run -d \
        --name backend-container \
        --network app-network \
        -p 5000:5000 \
        -e MONGO_URI=mongodb://mongo-container:27017/ \
        -e MONGO_DB_NAME=clickops-db-dev \
        -e S3_BUCKET_NAME=clickops-dev-bucket-vikram-2026-003 \
        -e AWS_REGION=$AWS_REGION \
        $ECR_REGISTRY/$BACKEND_REPO:$IMAGE_TAG

      docker run -d \
        --name frontend-container \
        --network app-network \
        -p 3000:80 \
        $ECR_REGISTRY/$FRONTEND_REPO:$IMAGE_TAG
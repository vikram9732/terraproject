<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ClickOps Student Database</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #6a7dfc, #9b59b6);
    }

    .container {
      background: #ffffff;
      width: 90%;
      max-width: 420px;
      padding: 30px 25px;
      border-radius: 12px;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
      text-align: center;
    }

    h1 {
      font-size: 20px;
      font-weight: bold;
      color: #333;
      margin-bottom: 25px;
      line-height: 1.4;
    }

    .form-group {
      margin-bottom: 15px;
      text-align: left;
    }

    input[type="text"],
    input[type="number"] {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #ddd;
      border-radius: 4px;
      outline: none;
      font-size: 14px;
    }

    input[type="text"]:focus,
    input[type="number"]:focus {
      border-color: #888;
    }

    .upload-wrapper {
      margin: 15px 0;
    }

    .upload-label {
      display: inline-block;
      background-color: #28a745;
      color: white;
      padding: 10px 18px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
      font-weight: bold;
      border: none;
    }

    .upload-label:hover {
      background-color: #218838;
    }

    input[type="file"] {
      display: none;
    }

    .file-name {
      display: block;
      margin-top: 8px;
      font-size: 13px;
      color: #555;
    }

    .button-group {
      margin-top: 15px;
      display: flex;
      justify-content: center;
      gap: 12px;
    }

    button {
      border: none;
      padding: 10px 18px;
      border-radius: 4px;
      font-size: 14px;
      cursor: pointer;
      color: white;
      font-weight: bold;
    }

    .submit-btn {
      background-color: #4c6ef5;
    }

    .submit-btn:hover {
      background-color: #3b5bdb;
    }

    .cancel-btn {
      background-color: #e74c3c;
    }

    .cancel-btn:hover {
      background-color: #c0392b;
    }

    .message {
      margin-top: 20px;
      font-size: 16px;
      font-weight: bold;
      color: green;
      min-height: 24px;
    }

    .error {
      color: red !important;
    }

    .response-box {
      margin-top: 15px;
      text-align: left;
      background: #f4f4f4;
      border-radius: 6px;
      padding: 12px;
      font-size: 13px;
      white-space: pre-wrap;
      word-wrap: break-word;
      display: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>ClickOps Student<br>Database</h1>

    <form id="studentForm">
      <div class="form-group">
        <input type="text" id="name" name="name" placeholder="Enter your name" required />
      </div>

      <div class="form-group">
        <input type="number" id="age" name="age" placeholder="Enter your age" required />
      </div>

      <div class="upload-wrapper">
        <label for="picture" class="upload-label">Upload Image</label>
        <input type="file" id="picture" name="picture" accept="image/*" required />
        <span class="file-name" id="fileName">No file chosen</span>
      </div>

      <div class="button-group">
        <button type="submit" class="submit-btn">Submit</button>
        <button type="button" class="cancel-btn" onclick="resetForm()">Cancel</button>
      </div>
    </form>

    <div class="message" id="message"></div>
    <div class="response-box" id="responseBox"></div>
  </div>

  <script>
    // IMPORTANT:
    // Keep this exact line format because your GitHub Actions workflow updates this value automatically.
    const backendUrl = "http://localhost:5000";

    const form = document.getElementById("studentForm");
    const message = document.getElementById("message");
    const responseBox = document.getElementById("responseBox");
    const pictureInput = document.getElementById("picture");
    const fileName = document.getElementById("fileName");

    pictureInput.addEventListener("change", function () {
      if (pictureInput.files.length > 0) {
        fileName.textContent = pictureInput.files[0].name;
      } else {
        fileName.textContent = "No file chosen";
      }
    });

    form.addEventListener("submit", async function (e) {
      e.preventDefault();

      message.textContent = "";
      message.classList.remove("error");
      responseBox.style.display = "none";
      responseBox.textContent = "";

      const formData = new FormData();
      formData.append("name", document.getElementById("name").value);
      formData.append("age", document.getElementById("age").value);
      formData.append("picture", document.getElementById("picture").files[0]);

      try {
        const response = await fetch(`${backendUrl}/submit`, {
          method: "POST",
          body: formData
        });

        const data = await response.json();

        if (response.ok) {
          message.textContent = "Image Submitted Successfully";
          responseBox.style.display = "block";
          responseBox.textContent = JSON.stringify(data, null, 2);
        } else {
          message.textContent = data.error || "Something went wrong";
          message.classList.add("error");
          responseBox.style.display = "block";
          responseBox.textContent = JSON.stringify(data, null, 2);
        }
      } catch (error) {
        message.textContent = "Failed to connect to backend";
        message.classList.add("error");
        responseBox.style.display = "block";
        responseBox.textContent = error.toString();
      }
    });

    function resetForm() {
      document.getElementById("studentForm").reset();
      document.getElementById("fileName").textContent = "No file chosen";
      document.getElementById("message").textContent = "";
      document.getElementById("message").classList.remove("error");
      document.getElementById("responseBox").style.display = "none";
      document.getElementById("responseBox").textContent = "";
    }
  </script>
</body>
</html>

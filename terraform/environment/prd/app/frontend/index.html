<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ClickOps Student Database</title>

  <style>
    * {
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(90deg, #6d8df5, #8a55d7);
    }

    .container {
      width: 420px;
      background: #ffffff;
      border-radius: 12px;
      padding: 35px 30px;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.15);
      text-align: center;
    }

    .container h1 {
      margin: 0 0 30px;
      font-size: 22px;
      font-weight: bold;
      color: #333;
      line-height: 1.3;
    }

    .form-group {
      margin-bottom: 16px;
      text-align: left;
    }

    .form-group input[type="text"],
    .form-group input[type="number"] {
      width: 100%;
      padding: 11px 12px;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-size: 14px;
      outline: none;
    }

    .form-group input[type="text"]:focus,
    .form-group input[type="number"]:focus {
      border-color: #6d8df5;
    }

    .file-input {
      display: none;
    }

    .upload-btn {
      display: inline-block;
      background-color: #41b36b;
      color: white;
      padding: 10px 22px;
      border-radius: 4px;
      font-size: 14px;
      cursor: pointer;
      border: none;
      margin-top: 4px;
      margin-bottom: 8px;
    }

    .upload-btn:hover {
      background-color: #34985a;
    }

    .file-name {
      display: block;
      margin-top: 8px;
      font-size: 13px;
      color: #555;
      min-height: 18px;
    }

    .button-row {
      margin-top: 12px;
      display: flex;
      justify-content: center;
      gap: 12px;
    }

    .submit-btn,
    .cancel-btn {
      border: none;
      color: white;
      padding: 10px 22px;
      border-radius: 4px;
      font-size: 14px;
      cursor: pointer;
      min-width: 90px;
    }

    .submit-btn {
      background-color: #4f79ff;
    }

    .submit-btn:hover {
      background-color: #3d67eb;
    }

    .cancel-btn {
      background-color: #e74c3c;
    }

    .cancel-btn:hover {
      background-color: #cf3e30;
    }

    .message {
      margin-top: 20px;
      font-size: 16px;
      font-weight: bold;
      color: green;
      min-height: 22px;
    }

    .error {
      color: red !important;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>ClickOps Student<br>Database</h1>

    <form id="studentForm">
      <div class="form-group">
        <input type="text" id="name" name="name" placeholder="Enter your name" required />
      </div>

      <div class="form-group">
        <input type="number" id="age" name="age" placeholder="Enter your age" required />
      </div>

      <div class="form-group" style="text-align:center;">
        <label for="picture" class="upload-btn">Upload Image</label>
        <input type="file" id="picture" name="picture" class="file-input" accept="image/*" required />
        <span id="fileName" class="file-name"></span>
      </div>

      <div class="button-row">
        <button type="submit" class="submit-btn">Submit</button>
        <button type="button" class="cancel-btn" onclick="clearForm()">Cancel</button>
      </div>
    </form>

    <div id="message" class="message"></div>
  </div>

  <script>
    // IMPORTANT:
    // Keep this line exactly in this format.
    // Your GitHub Actions workflow changes this automatically.
    const backendUrl = "http://localhost:5000";

    const form = document.getElementById("studentForm");
    const fileInput = document.getElementById("picture");
    const fileName = document.getElementById("fileName");
    const messageBox = document.getElementById("message");

    fileInput.addEventListener("change", function () {
      if (fileInput.files.length > 0) {
        fileName.textContent = fileInput.files[0].name;
      } else {
        fileName.textContent = "";
      }
    });

    function clearForm() {
      document.getElementById("name").value = "";
      document.getElementById("age").value = "";
      document.getElementById("picture").value = "";
      document.getElementById("fileName").textContent = "";
      messageBox.textContent = "";
      messageBox.classList.remove("error");
    }

    form.addEventListener("submit", async function (e) {
      e.preventDefault();

      messageBox.textContent = "";
      messageBox.classList.remove("error");

      const name = document.getElementById("name").value;
      const age = document.getElementById("age").value;
      const picture = document.getElementById("picture").files[0];

      if (!name || !age || !picture) {
        messageBox.textContent = "Please fill all fields and upload an image";
        messageBox.classList.add("error");
        return;
      }

      const formData = new FormData();
      formData.append("name", name);
      formData.append("age", age);
      formData.append("picture", picture);

      try {
        const response = await fetch(`${backendUrl}/submit`, {
          method: "POST",
          body: formData
        });

        const result = await response.json();

        if (response.ok) {
          messageBox.textContent = "Image Submitted Successfully";
          messageBox.classList.remove("error");
          form.reset();
          fileName.textContent = "";
        } else {
          messageBox.textContent = result.error || "Submission failed";
          messageBox.classList.add("error");
        }
      } catch (error) {
        messageBox.textContent = "Backend connection failed";
        messageBox.classList.add("error");
      }
    });
  </script>
</body>
</html>
